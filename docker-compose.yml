services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - rss-data:/app/data
    env_file:
      - .env
    depends_on:
      rsshub:
        condition: service_healthy

  rsshub:
    image: diygod/rsshub
    restart: always
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: "redis://redis:6379/"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

volumes:
  rss-data:
  redis-data:
